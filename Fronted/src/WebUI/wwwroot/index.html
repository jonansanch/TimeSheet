<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPG Timesheet</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="KPG.Timesheet.WebUI.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div id="kpg-loading">
            <div class="kpg-loading-brand">
                <svg class="kpg-loading-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#5BB8D4" width="48" height="48">
                    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/>
                </svg>
                <span class="kpg-brand-title">KPG Timesheet</span>
            </div>
            <p class="kpg-loading-text">Cargando KPG Timesheet...</p>
            <div class="kpg-loading-bar-wrap">
                <div class="kpg-loading-bar"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocurrió un error inesperado.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">✕</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        globalThis.downloadFile = function (fileName, contentType, base64) {
            const a = document.createElement('a');
            a.href = 'data:' + contentType + ';base64,' + base64;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            a.remove();
        };
    </script>
</body>

</html>
